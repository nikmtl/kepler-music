name: Feature request
description: Suggest an idea or improvement for the music search plugin
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Idea
      description: What would you like to change?
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Share the idea, use case, or desired behavior.

  - type: checkboxes
    attributes:
      label: Duplicate check
      description: Please check if your idea has already been suggested.
      options:
        - label: I have searched the existing issues and believe this is not a duplicate.
          required: true
