name: Feature request
description: Suggest an idea or improvement for Kepler Music Search
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What would you like to change?
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Share the idea, use case, or desired behavior.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, screenshots, or examples if useful.
