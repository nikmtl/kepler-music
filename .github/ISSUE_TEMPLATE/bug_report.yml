name: Bug report
description: Report a bug with the music search plugin
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: bug
    attributes:
      label: What went wrong?
      description: Expected behavior vs actual behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps to reproduce the issue.
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Music source
      description: Which source was active when the issue happened?
      options:
        - Spotify
        - Apple Music
        - Genius
        - Multiple
        - Unrelated
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: OS and Kepler version
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Duplicate check
      description: Please check if your issue has already been reported.
      options:
        - label: I have searched the existing issues and believe this is not a duplicate.
          required: true
