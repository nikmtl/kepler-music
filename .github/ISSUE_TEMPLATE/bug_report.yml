name: Bug report
description: Report a reproducible bug in Kepler Music Search
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps to reproduce the issue.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Music source
      description: Which source was active when the issue happened?
      options:
        - Spotify
        - Apple Music
        - Genius
        - Multiple
        - Not sure
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs or error messages.

  - type: input
    id: version
    attributes:
      label: Plugin version
      description: What plugin version are you using?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and Kepler version.
